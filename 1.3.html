<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Tutor: Steepness, Direction, and Alternative Forms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .math-font { font-family: 'Cambria Math', 'Times New Roman', serif; font-style: italic; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans overflow-hidden">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
        <div>
            <h1 class="text-2xl font-bold">Interactive Math Sandbox</h1>
            <p class="text-indigo-200 text-sm">Module 3: Steepness, Direction & Alternative Forms (<span class="math-font">ax + by = k</span>)</p>
        </div>
        <div class="text-sm bg-indigo-700 px-3 py-1 rounded-full border border-indigo-500">
            Secondary 2 Mathematics
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden flex-col md:flex-row">
        
        <!-- Left Panel: The Tutor -->
        <section class="w-full md:w-1/3 lg:w-2/5 bg-white border-r border-slate-200 flex flex-col h-full shadow-lg z-0">
            <!-- Navigation Tabs -->
            <div class="flex border-b border-slate-200 bg-slate-50 shrink-0 overflow-x-auto">
                <button onclick="loadContent('intro')" id="tab-intro" class="flex-1 py-3 px-4 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 hover:bg-slate-100 transition-colors whitespace-nowrap">Steepness & Direction</button>
                <button onclick="loadContent('parallel')" id="tab-parallel" class="flex-1 py-3 px-4 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:bg-slate-100 transition-colors whitespace-nowrap">Parallel Lines</button>
                <button onclick="loadContent('standard')" id="tab-standard" class="flex-1 py-3 px-4 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:bg-slate-100 transition-colors whitespace-nowrap">Standard Form</button>
            </div>

            <!-- Content Area -->
            <div id="tutor-content" class="p-6 overflow-y-auto flex-1 text-slate-700 leading-relaxed">
                <!-- Content injected via JS -->
            </div>
        </section>

        <!-- Right Panel: The Sandbox -->
        <section class="w-full md:w-2/3 lg:w-3/5 bg-slate-100 flex flex-col h-full relative">
            
            <!-- Dynamic Equation Display -->
            <div class="absolute top-4 left-0 right-0 flex justify-center z-10 pointer-events-none">
                <div class="bg-white/90 backdrop-blur px-8 py-3 rounded-2xl shadow-lg border border-indigo-100 text-center pointer-events-auto">
                    <p class="text-sm text-slate-500 font-semibold uppercase tracking-wider mb-1">Standard Form Equation</p>
                    <p class="text-3xl text-indigo-700 font-bold math-font" id="equation-display">1x + 1y = 5</p>
                    <p class="text-xs font-bold text-slate-400 mt-1" id="gradient-display">y-intercept form: y = -1x + 5 (m = -1)</p>
                </div>
            </div>

            <!-- Canvas Area -->
            <div class="flex-1 p-4 pt-28 pb-0 flex items-center justify-center relative">
                <div class="w-full h-full max-h-[55vh] bg-white rounded-xl shadow-inner border border-slate-200 p-2 relative">
                    <canvas id="mathChart"></canvas>
                </div>
            </div>

            <!-- Control Panel -->
            <div class="bg-white border-t border-slate-200 p-6 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Equation Parameters (<span class="math-font text-indigo-500">ax + by = k</span>)</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                    <!-- Slider A -->
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-sm font-medium text-slate-700">Coefficient <span class="math-font text-indigo-700">a</span></label>
                            <span id="val-a" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">1</span>
                        </div>
                        <input type="range" id="slider-a" min="-5" max="5" step="0.5" value="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                    </div>

                    <!-- Slider B -->
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-sm font-medium text-slate-700">Coefficient <span class="math-font text-indigo-700">b</span></label>
                            <span id="val-b" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">1</span>
                        </div>
                        <input type="range" id="slider-b" min="-5" max="5" step="0.5" value="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                    </div>

                    <!-- Slider K -->
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-sm font-medium text-slate-700">Constant <span class="math-font text-indigo-700">k</span></label>
                            <span id="val-k" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">5</span>
                        </div>
                        <input type="range" id="slider-k" min="-10" max="10" step="1" value="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                    </div>
                </div>

                <div id="intercept-feedback" class="mt-4 p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm flex justify-between">
                    <!-- Updated via JS -->
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- Tutor Content Data ---
        const tutorData = {
            intro: `
                <h2 class="text-2xl font-bold text-indigo-900 mb-4">Steepness & Direction</h2>
                <p class="mb-4">The gradient (<span class="math-font text-indigo-600">m</span>) tells us two vital things about a straight line: how steep it is, and which way it slopes.</p>
                
                <div class="space-y-4">
                    <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <p class="font-bold text-indigo-800 mb-2">1. Direction (+ vs -)</p>
                        <ul class="list-disc ml-5 text-sm space-y-1">
                            <li>If <span class="math-font">m</span> is <strong>positive</strong>, the line slopes upwards to the right.</li>
                            <li>If <span class="math-font">m</span> is <strong>negative</strong>, the line slopes upwards to the left.</li>
                        </ul>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <p class="font-bold text-indigo-800 mb-2">2. Steepness (Numerical Value)</p>
                        <p class="text-sm">The <em>bigger</em> the numerical value of <span class="math-font">m</span> (ignoring the negative sign), the <strong>steeper</strong> the line.</p>
                    </div>
                </div>

                <h3 class="text-lg font-bold text-slate-700 mt-6 mb-3">Try it in the Sandbox:</h3>
                <p class="text-sm mb-3">When we write an equation like <span class="math-font">ax + by = k</span>, we can rearrange it to find the gradient. If we set <span class="math-font">b = 1</span> and <span class="math-font">k = 0</span>, the slider for <span class="math-font">a</span> controls the negative gradient!</p>
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setSandbox(-1, 1, 0)" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-2 rounded hover:bg-indigo-200 transition font-medium text-center">Graph y = x<br><span class="text-slate-500 font-normal">(-1x + 1y = 0)</span></button>
                    <button onclick="setSandbox(-3, 1, 0)" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-2 rounded hover:bg-indigo-200 transition font-medium text-center">Graph y = 3x<br><span class="text-slate-500 font-normal">(-3x + 1y = 0)</span></button>
                    <button onclick="setSandbox(1, 1, 0)" class="text-xs bg-pink-100 text-pink-700 px-2 py-2 rounded hover:bg-pink-200 transition font-medium text-center">Graph y = -x<br><span class="text-slate-500 font-normal">(1x + 1y = 0)</span></button>
                    <button onclick="setSandbox(3, 1, 0)" class="text-xs bg-pink-100 text-pink-700 px-2 py-2 rounded hover:bg-pink-200 transition font-medium text-center">Graph y = -3x<br><span class="text-slate-500 font-normal">(3x + 1y = 0)</span></button>
                </div>
            `,
            parallel: `
                <h2 class="text-2xl font-bold text-indigo-900 mb-4">Parallel Lines</h2>
                <p class="mb-4">What happens if we keep the steepness and direction the same, but change where the line starts?</p>
                
                <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-200 mb-6">
                    <p class="text-sm text-indigo-900">When the value of <span class="math-font">m</span> remains the same but <span class="math-font">c</span> takes on different values, the graphs are <strong>parallel lines</strong>.</p>
                </div>

                <p class="text-sm mb-4">For example, the lines <span class="math-font">y = 0.5x + 1</span>, <span class="math-font">y = 0.5x + 2</span>, and <span class="math-font">y = 0.5x - 2</span> all have exactly the same slope (<span class="math-font">m = 0.5</span>), so they will never intersect.</p>

                <h3 class="text-lg font-bold text-slate-700 mt-6 mb-3">Try it in the Sandbox:</h3>
                <p class="text-sm mb-3">Notice how changing the <span class="math-font">k</span> value shifts the line parallel to itself!</p>
                
                <div class="space-y-2">
                    <button onclick="setSandbox(-0.5, 1, 1)" class="w-full text-xs bg-indigo-100 text-indigo-700 px-3 py-2 rounded hover:bg-indigo-200 transition font-medium text-left">1. Graph y = 0.5x + 1 <span class="float-right text-slate-500">(-0.5x + 1y = 1)</span></button>
                    <button onclick="setSandbox(-0.5, 1, 4)" class="w-full text-xs bg-indigo-100 text-indigo-700 px-3 py-2 rounded hover:bg-indigo-200 transition font-medium text-left">2. Graph y = 0.5x + 4 <span class="float-right text-slate-500">(-0.5x + 1y = 4)</span></button>
                    <button onclick="setSandbox(-0.5, 1, -3)" class="w-full text-xs bg-indigo-100 text-indigo-700 px-3 py-2 rounded hover:bg-indigo-200 transition font-medium text-left">3. Graph y = 0.5x - 3 <span class="float-right text-slate-500">(-0.5x + 1y = -3)</span></button>
                </div>
            `,
            standard: `
                <h2 class="text-2xl font-bold text-indigo-900 mb-4">Standard Form (<span class="math-font">ax + by = k</span>)</h2>
                <p class="mb-4 text-sm">Sometimes equations aren't given nicely as <span class="math-font">y = mx + c</span>. They might look like <span class="math-font">2x + 3y = 6</span>. We can find the intercepts and gradient directly from this form!</p>

                <div class="bg-slate-800 text-white p-4 rounded-lg font-mono text-sm mb-6 space-y-2">
                    <p class="text-indigo-300 mb-1">Given: ax + by = k</p>
                    <p>Rearranging: by = -ax + k</p>
                    <p class="bg-slate-700 p-2 rounded">y = -(a/b)x + (k/b)</p>
                </div>

                <ul class="space-y-4 mb-6">
                    <li class="flex items-start">
                        <span class="inline-flex items-center justify-center w-6 h-6 rounded bg-emerald-100 text-emerald-700 font-bold text-xs mr-3 shrink-0">x</span>
                        <div class="text-sm">
                            <strong>x-intercept:</strong> Set y=0.<br>
                            Crosses x-axis at <span class="math-font bg-emerald-50 px-1">k / a</span>
                        </div>
                    </li>
                    <li class="flex items-start">
                        <span class="inline-flex items-center justify-center w-6 h-6 rounded bg-pink-100 text-pink-700 font-bold text-xs mr-3 shrink-0">y</span>
                        <div class="text-sm">
                            <strong>y-intercept:</strong> Set x=0.<br>
                            Crosses y-axis at <span class="math-font bg-pink-50 px-1">k / b</span>
                        </div>
                    </li>
                    <li class="flex items-start">
                        <span class="inline-flex items-center justify-center w-6 h-6 rounded bg-indigo-100 text-indigo-700 font-bold text-xs mr-3 shrink-0">m</span>
                        <div class="text-sm">
                            <strong>Gradient:</strong> <br>
                            Calculated as <span class="math-font bg-indigo-50 px-1">-a / b</span>
                        </div>
                    </li>
                </ul>

                <button onclick="setSandbox(2, 3, 6)" class="w-full text-sm bg-indigo-600 text-white px-3 py-2 rounded hover:bg-indigo-700 transition font-medium shadow">Analyze 2x + 3y = 6</button>
            `
        };

        // --- Chart Initialization ---
        const ctx = document.getElementById('mathChart').getContext('2d');
        
        let chartInstance = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [
                    {
                        label: 'Line Graph',
                        data: [],
                        borderColor: '#4f46e5', // indigo-600
                        backgroundColor: '#4f46e5',
                        borderWidth: 2,
                        showLine: true,
                        tension: 0,
                        pointRadius: 0
                    },
                    {
                        label: 'x-intercept',
                        data: [],
                        backgroundColor: '#10b981', // emerald-500
                        borderColor: '#ffffff',
                        borderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8
                    },
                    {
                        label: 'y-intercept',
                        data: [],
                        backgroundColor: '#ec4899', // pink-500
                        borderColor: '#ffffff',
                        borderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 200 },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                return label + `(${context.parsed.x.toFixed(2)}, ${context.parsed.y.toFixed(2)})`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        min: -10,
                        max: 10,
                        grid: {
                            color: (c) => c.tick.value === 0 ? '#1e293b' : '#f1f5f9',
                            lineWidth: (c) => c.tick.value === 0 ? 2 : 1
                        },
                        ticks: { stepSize: 2 }
                    },
                    y: {
                        min: -10,
                        max: 10,
                        grid: {
                            color: (c) => c.tick.value === 0 ? '#1e293b' : '#f1f5f9',
                            lineWidth: (c) => c.tick.value === 0 ? 2 : 1
                        },
                        ticks: { stepSize: 2 }
                    }
                }
            }
        });

        // --- UI Logic ---
        const sliderA = document.getElementById('slider-a');
        const sliderB = document.getElementById('slider-b');
        const sliderK = document.getElementById('slider-k');
        
        const valA = document.getElementById('val-a');
        const valB = document.getElementById('val-b');
        const valK = document.getElementById('val-k');
        
        const eqDisplay = document.getElementById('equation-display');
        const gradDisplay = document.getElementById('gradient-display');
        const interceptFeedback = document.getElementById('intercept-feedback');

        function updateGraph() {
            let a = parseFloat(sliderA.value);
            let b = parseFloat(sliderB.value);
            let k = parseFloat(sliderK.value);
            
            // Prevent both a and b from being zero
            if (a === 0 && b === 0) {
                b = 0.5;
                sliderB.value = 0.5;
            }

            // Update Labels
            valA.textContent = a;
            valB.textContent = b;
            valK.textContent = k;

            // Format Standard Equation
            let signB = b < 0 ? '-' : '+';
            eqDisplay.innerHTML = `${a}x ${signB} ${Math.abs(b)}y = ${k}`;

            let lineData = [];
            let xIntData = [];
            let yIntData = [];

            if (b === 0) {
                // Vertical Line: x = k/a
                let xVal = k / a;
                lineData = [{ x: xVal, y: -20 }, { x: xVal, y: 20 }];
                xIntData = [{ x: xVal, y: 0 }];
                gradDisplay.textContent = `Vertical Line (Gradient is undefined)`;
                interceptFeedback.innerHTML = `
                    <span class="text-emerald-700"><strong>x-intercept:</strong> (${xVal.toFixed(2)}, 0)</span>
                    <span class="text-slate-400"><strong>y-intercept:</strong> None</span>
                `;
            } else if (a === 0) {
                // Horizontal Line: y = k/b
                let yVal = k / b;
                lineData = [{ x: -20, y: yVal }, { x: 20, y: yVal }];
                yIntData = [{ x: 0, y: yVal }];
                gradDisplay.textContent = `Horizontal Line (Gradient m = 0)`;
                interceptFeedback.innerHTML = `
                    <span class="text-slate-400"><strong>x-intercept:</strong> None</span>
                    <span class="text-pink-700"><strong>y-intercept:</strong> (0, ${yVal.toFixed(2)})</span>
                `;
            } else {
                // Standard Slanted Line
                let m = -a / b;
                let c = k / b;
                let xInt = k / a;
                
                // Need two points far apart
                lineData = [
                    { x: -20, y: (m * -20) + c },
                    { x: 20, y: (m * 20) + c }
                ];
                
                xIntData = [{ x: xInt, y: 0 }];
                yIntData = [{ x: 0, y: c }];

                let signC = c < 0 ? '-' : '+';
                let cAbs = Math.abs(c);
                gradDisplay.textContent = `y-intercept form: y = ${m % 1 === 0 ? m : m.toFixed(2)}x ${c !== 0 ? signC + ' ' + (cAbs % 1 === 0 ? cAbs : cAbs.toFixed(2)) : ''} (m = ${m % 1 === 0 ? m : m.toFixed(2)})`;
                
                interceptFeedback.innerHTML = `
                    <span class="text-emerald-700"><strong>x-intercept:</strong> (${xInt % 1 === 0 ? xInt : xInt.toFixed(2)}, 0)</span>
                    <span class="text-pink-700"><strong>y-intercept:</strong> (0, ${c % 1 === 0 ? c : c.toFixed(2)})</span>
                `;
            }

            chartInstance.data.datasets[0].data = lineData;
            chartInstance.data.datasets[1].data = xIntData;
            chartInstance.data.datasets[2].data = yIntData;
            chartInstance.update();
        }

        // External control for buttons
        function setSandbox(a, b, k) {
            sliderA.value = a;
            sliderB.value = b;
            sliderK.value = k;
            updateGraph();
        }

        // Navigation Logic
        function loadContent(tabId) {
            const tabs = ['intro', 'parallel', 'standard'];
            tabs.forEach(t => {
                const el = document.getElementById('tab-' + t);
                if (t === tabId) {
                    el.classList.remove('text-slate-500', 'border-transparent');
                    el.classList.add('text-indigo-600', 'border-indigo-600');
                } else {
                    el.classList.add('text-slate-500', 'border-transparent');
                    el.classList.remove('text-indigo-600', 'border-indigo-600');
                }
            });

            document.getElementById('tutor-content').innerHTML = tutorData[tabId];
            
            // Contextual Defaults
            if(tabId === 'intro') setSandbox(-1, 1, 0);
            if(tabId === 'parallel') setSandbox(-0.5, 1, 1);
            if(tabId === 'standard') setSandbox(2, 3, 6);
        }

        // Event Listeners
        sliderA.addEventListener('input', updateGraph);
        sliderB.addEventListener('input', updateGraph);
        sliderK.addEventListener('input', updateGraph);

        // Initialize
        loadContent('intro');

    </script>
</body>
</html>
