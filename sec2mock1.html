<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sec 2 Math Mock Exam</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX directly in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Inline SVG Icons (Replacing lucide-react imports for pure HTML) ---
    const CheckCircle2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>
    );
    const XCircle = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>
    );
    const Lightbulb = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>
    );
    const RefreshCcw = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path><path d="M16 21v-5h5"></path></svg>
    );
    const Play = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
    );
    const ChevronLeft = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"></path></svg>
    );
    const ChevronRight = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"></path></svg>
    );


    // --- Custom component to render inline math enclosed in $ $ ---
    const FormattedText = ({ text }) => {
      if (!text) return null;
      const parts = text.split(/\$(.*?)\$/g);
      return (
        <span>
          {parts.map((part, index) => {
            if (index % 2 === 1) {
              // Parse basic LaTeX into clean, textbook-style HTML
              let html = part
                .replace(/\\times/g, ' &times; ')
                .replace(/\\div/g, ' &divide; ')
                .replace(/\\Rightarrow/g, ' &rArr; ')
                .replace(/\\le/g, ' &le; ')
                .replace(/\\ge/g, ' &ge; ')
                .replace(/\\pm/g, ' &plusmn; ')
                .replace(/\\pi/g, '&pi;')
                .replace(/\^\\circ/g, '&deg;')
                .replace(/\\text\{([^}]+)\}/g, '<span class="font-sans text-[0.9em]">$1</span>')
                .replace(/\\sqrt\{([^}]+)\}/g, '<span class="whitespace-nowrap">&radic;<span class="border-t border-slate-700 ml-[1px] pt-[1px]">$1</span></span>')
                .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '<span class="inline-flex flex-col align-middle text-center mx-1" style="font-size: 0.85em; line-height: 1.2;"><span class="border-b border-slate-700 px-0.5">$1</span><span class="px-0.5">$2</span></span>')
                .replace(/\^\{([^}]+)\}/g, '<sup class="text-[0.75em]">$1</sup>')
                .replace(/\^([a-zA-Z0-9])/g, '<sup class="text-[0.75em]">$1</sup>');

              return (
                <span
                  key={index}
                  className="font-serif text-[1.1em] text-slate-800 tracking-wide mx-0.5"
                  dangerouslySetInnerHTML={{ __html: html }}
                />
              );
            }
            
            // Regular text
            return <span key={index}>{part}</span>;
          })}
        </span>
      );
    };

    // --- Main App Component ---
    function App() {
      const [view, setView] = useState('start'); // 'start', 'quiz', 'results'
      const [currentIndex, setCurrentIndex] = useState(0);
      const [answers, setAnswers] = useState({});
      const [showFeedback, setShowFeedback] = useState({});
      const [showHint, setShowHint] = useState({});

      const question = quizData[currentIndex];
      const totalQuestions = quizData.length;

      const handleSelectOption = (optionIndex) => {
        if (showFeedback[currentIndex]) return; // prevent changing answer after checking
        setAnswers({ ...answers, [currentIndex]: optionIndex });
      };

      const handleCheckAnswer = () => {
        if (answers[currentIndex] !== undefined) {
          setShowFeedback({ ...showFeedback, [currentIndex]: true });
        }
      };

      const handleNext = () => {
        if (currentIndex < totalQuestions - 1) setCurrentIndex(currentIndex + 1);
      };

      const handlePrev = () => {
        if (currentIndex > 0) setCurrentIndex(currentIndex - 1);
      };

      const toggleHint = () => {
        setShowHint({ ...showHint, [currentIndex]: !showHint[currentIndex] });
      };

      const calculateScore = () => {
        let score = 0;
        Object.keys(showFeedback).forEach((key) => {
          const qIndex = parseInt(key, 10);
          const selectedOption = answers[qIndex];
          if (selectedOption !== undefined && quizData[qIndex].answerOptions[selectedOption].isCorrect) {
            score++;
          }
        });
        return score;
      };

      const restartQuiz = () => {
        setAnswers({});
        setShowFeedback({});
        setShowHint({});
        setCurrentIndex(0);
        setView('start');
      };

      const getQuestionStatusColor = (index) => {
        if (!showFeedback[index]) return 'bg-slate-100 text-slate-600 hover:bg-slate-200 border-slate-200';
        const isCorrect = quizData[index].answerOptions[answers[index]].isCorrect;
        return isCorrect 
          ? 'bg-emerald-100 text-emerald-700 border-emerald-300' 
          : 'bg-rose-100 text-rose-700 border-rose-300';
      };

      if (view === 'start') {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6">
            <div className="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-8 text-center space-y-6">
              <div className="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <CheckCircle2 className="w-10 h-10 text-indigo-600" />
              </div>
              <h1 className="text-4xl font-bold text-slate-800">Sec 2 Math Mock Exam</h1>
              <p className="text-lg text-slate-600">
                Test your knowledge across 7 key topics: Linear Graphs & Simultaneous Equations, Inequalities, Expansion & Factorisation, Special Identities, Quadratics, Algebraic Fractions, and Proportions.
              </p>
              <div className="grid grid-cols-2 gap-4 text-left bg-slate-50 p-6 rounded-xl border border-slate-100 mb-8">
                <div><span className="font-semibold text-slate-700">Questions:</span> {totalQuestions}</div>
                <div><span className="font-semibold text-slate-700">Mode:</span> Practice (Immediate Feedback)</div>
                <div><span className="font-semibold text-slate-700">Format:</span> Multiple Choice & Word Problems</div>
                <div><span className="font-semibold text-slate-700">Level:</span> Secondary 2</div>
              </div>
              <button 
                onClick={() => setView('quiz')}
                className="w-full sm:w-auto px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold text-lg transition-colors flex items-center justify-center gap-2 mx-auto"
              >
                <Play className="w-5 h-5" /> Start Exam
              </button>
            </div>
          </div>
        );
      }

      if (view === 'results') {
        const score = calculateScore();
        const percentage = Math.round((score / totalQuestions) * 100);
        return (
          <div className="min-h-screen bg-slate-50 p-6 flex flex-col items-center py-12">
            <div className="max-w-3xl w-full bg-white rounded-2xl shadow-xl p-8 text-center space-y-8">
              <h2 className="text-3xl font-bold text-slate-800">Exam Results</h2>
              
              <div className="relative w-48 h-48 mx-auto flex items-center justify-center bg-indigo-50 rounded-full border-8 border-indigo-100">
                <div className="text-center">
                  <span className="text-5xl font-extrabold text-indigo-700">{percentage}%</span>
                  <p className="text-indigo-600 font-medium mt-1">Score</p>
                </div>
              </div>

              <div className="flex justify-center gap-8 text-lg">
                <div className="flex flex-col items-center">
                  <span className="text-3xl font-bold text-emerald-600">{score}</span>
                  <span className="text-slate-500">Correct</span>
                </div>
                <div className="w-px bg-slate-200"></div>
                <div className="flex flex-col items-center">
                  <span className="text-3xl font-bold text-rose-600">{Object.keys(showFeedback).length - score}</span>
                  <span className="text-slate-500">Incorrect</span>
                </div>
                <div className="w-px bg-slate-200"></div>
                <div className="flex flex-col items-center">
                  <span className="text-3xl font-bold text-slate-400">{totalQuestions - Object.keys(showFeedback).length}</span>
                  <span className="text-slate-500">Skipped</span>
                </div>
              </div>

              <div className="pt-8 border-t border-slate-100 flex flex-col sm:flex-row gap-4 justify-center">
                <button 
                  onClick={() => setView('quiz')}
                  className="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-medium transition-colors"
                >
                  Review Answers
                </button>
                <button 
                  onClick={restartQuiz}
                  className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium transition-colors flex items-center justify-center gap-2"
                >
                  <RefreshCcw className="w-5 h-5" /> Retake Exam
                </button>
              </div>
            </div>
          </div>
        );
      }

      const isAnswered = answers[currentIndex] !== undefined;
      const hasChecked = showFeedback[currentIndex];
      const selectedIsCorrect = isAnswered && question.answerOptions[answers[currentIndex]].isCorrect;

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row">
          
          {/* Sidebar Navigation */}
          <div className="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col h-auto md:h-screen md:sticky top-0 p-6 overflow-y-auto hidden md:flex shrink-0">
            <h3 className="text-lg font-bold text-slate-800 mb-6">Question Navigator</h3>
            <div className="grid grid-cols-5 gap-2">
              {quizData.map((q, idx) => (
                <button
                  key={idx}
                  onClick={() => setCurrentIndex(idx)}
                  className={`
                    h-10 rounded-lg text-sm font-semibold flex items-center justify-center border transition-all
                    ${currentIndex === idx ? 'ring-2 ring-indigo-500 ring-offset-2' : ''}
                    ${getQuestionStatusColor(idx)}
                  `}
                >
                  {idx + 1}
                </button>
              ))}
            </div>
            <div className="mt-auto pt-8">
              <button 
                onClick={() => setView('results')}
                className="w-full py-3 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-semibold transition-colors"
              >
                Finish & View Results
              </button>
            </div>
          </div>

          {/* Main Quiz Area */}
          <div className="flex-1 p-4 md:p-8 overflow-y-auto">
            <div className="max-w-3xl mx-auto space-y-6">
              
              {/* Header */}
              <div className="flex items-center justify-between">
                <span className="text-indigo-600 font-bold tracking-wide uppercase text-sm">
                  Question {currentIndex + 1} of {totalQuestions}
                </span>
                <button 
                  onClick={() => setView('results')}
                  className="md:hidden text-sm font-medium text-slate-500 hover:text-slate-800"
                >
                  Finish
                </button>
              </div>

              {/* Progress bar */}
              <div className="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                <div 
                  className="h-full bg-indigo-500 transition-all duration-300"
                  style={{ width: `${((currentIndex + 1) / totalQuestions) * 100}%` }}
                ></div>
              </div>

              {/* Question Card */}
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="p-6 md:p-8">
                  <h2 className="text-xl md:text-2xl text-slate-800 font-medium leading-relaxed mb-8">
                    <FormattedText text={question.question} />
                  </h2>

                  <div className="space-y-3">
                    {question.answerOptions.map((option, optIdx) => {
                      const isSelected = answers[currentIndex] === optIdx;
                      let optionClass = "border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 text-slate-700";
                      let icon = null;

                      if (hasChecked) {
                        if (option.isCorrect) {
                          optionClass = "border-emerald-500 bg-emerald-50 text-emerald-800 ring-1 ring-emerald-500";
                          icon = <CheckCircle2 className="w-5 h-5 text-emerald-600 ml-auto" />;
                        } else if (isSelected && !option.isCorrect) {
                          optionClass = "border-rose-500 bg-rose-50 text-rose-800 ring-1 ring-rose-500";
                          icon = <XCircle className="w-5 h-5 text-rose-600 ml-auto" />;
                        } else {
                          optionClass = "border-slate-200 opacity-60 bg-slate-50 text-slate-500";
                        }
                      } else if (isSelected) {
                        optionClass = "border-indigo-500 bg-indigo-50 text-indigo-800 ring-1 ring-indigo-500";
                      }

                      return (
                        <button
                          key={optIdx}
                          onClick={() => handleSelectOption(optIdx)}
                          disabled={hasChecked}
                          className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center ${optionClass} ${hasChecked ? 'cursor-default' : 'cursor-pointer'}`}
                        >
                          <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center mr-4 shrink-0
                            ${isSelected ? (hasChecked && !option.isCorrect ? 'border-rose-500' : 'border-indigo-500') : 'border-slate-300'}
                          `}>
                            {isSelected && <div className={`w-2.5 h-2.5 rounded-full ${hasChecked && !option.isCorrect ? 'bg-rose-500' : 'bg-indigo-500'}`} />}
                          </div>
                          <span className="text-lg">
                            <FormattedText text={option.text} />
                          </span>
                          {icon}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Actions & Feedback */}
                <div className="bg-slate-50 p-6 border-t border-slate-100">
                  <div className="flex flex-wrap gap-4 items-center justify-between">
                    <button
                      onClick={toggleHint}
                      className="flex items-center gap-2 text-amber-600 hover:text-amber-700 font-medium bg-amber-50 px-4 py-2 rounded-lg transition-colors"
                    >
                      <Lightbulb className="w-5 h-5" />
                      {showHint[currentIndex] ? 'Hide Hint' : 'Show Hint'}
                    </button>

                    {!hasChecked ? (
                      <button
                        onClick={handleCheckAnswer}
                        disabled={!isAnswered}
                        className={`px-6 py-2.5 rounded-lg font-semibold flex items-center gap-2 transition-all
                          ${isAnswered 
                            ? 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-md hover:shadow-lg' 
                            : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                      >
                        Check Answer
                      </button>
                    ) : (
                      <div className={`px-4 py-2 rounded-lg font-semibold flex items-center gap-2 ${selectedIsCorrect ? 'text-emerald-700 bg-emerald-100' : 'text-rose-700 bg-rose-100'}`}>
                        {selectedIsCorrect ? <><CheckCircle2 className="w-5 h-5" /> Correct</> : <><XCircle className="w-5 h-5" /> Incorrect</>}
                      </div>
                    )}
                  </div>

                  {/* Hint Panel */}
                  {showHint[currentIndex] && (
                    <div className="mt-4 p-4 bg-amber-100 border border-amber-200 text-amber-800 rounded-xl flex gap-3 animate-in fade-in slide-in-from-top-2">
                      <Lightbulb className="w-6 h-6 shrink-0 mt-0.5" />
                      <p><FormattedText text={question.hint} /></p>
                    </div>
                  )}

                  {/* Rationale Panel */}
                  {hasChecked && (
                    <div className="mt-4 space-y-3 animate-in fade-in slide-in-from-top-2">
                      <h4 className="font-semibold text-slate-700 text-sm uppercase tracking-wide">Explanation</h4>
                      <div className="p-4 bg-white border border-slate-200 rounded-xl text-slate-700 leading-relaxed shadow-sm">
                        <p className="mb-3"><span className="font-semibold">Your selection:</span> <FormattedText text={question.answerOptions[answers[currentIndex]].rationale} /></p>
                        
                        {!selectedIsCorrect && (
                           <p className="pt-3 border-t border-slate-100 text-emerald-700">
                             <span className="font-semibold">Correct Answer:</span> <FormattedText text={question.answerOptions.find(o => o.isCorrect).rationale} />
                           </p>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* Navigation Controls */}
              <div className="flex items-center justify-between pt-4">
                <button
                  onClick={handlePrev}
                  disabled={currentIndex === 0}
                  className={`flex items-center gap-2 px-5 py-3 rounded-xl font-medium transition-colors
                    ${currentIndex === 0 ? 'text-slate-400 cursor-not-allowed' : 'text-slate-700 bg-white hover:bg-slate-200 shadow-sm border border-slate-200'}`}
                >
                  <ChevronLeft className="w-5 h-5" /> Previous
                </button>
                
                <button
                  onClick={handleNext}
                  disabled={currentIndex === totalQuestions - 1}
                  className={`flex items-center gap-2 px-5 py-3 rounded-xl font-medium transition-colors
                    ${currentIndex === totalQuestions - 1 ? 'text-slate-400 cursor-not-allowed' : 'text-slate-700 bg-white hover:bg-slate-200 shadow-sm border border-slate-200'}`}
                >
                  Next <ChevronRight className="w-5 h-5" />
                </button>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // --- Quiz Data ---
    const quizData = [
      // --- Chapter 1: Linear Graphs and Simultaneous Equations ---
      {
        "questionNumber": 1,
        "question": "What is the equation of a horizontal line passing through the point $(0, 5)$?",
        "answerOptions": [
          { "text": "$x = 5$", "rationale": "$x = 5$ is a vertical line where the x-coordinate is always 5.", "isCorrect": false },
          { "text": "$y = 5$", "rationale": "A horizontal line has a gradient of zero, meaning the y-value is constant. Thus, $y = 5$.", "isCorrect": true },
          { "text": "$y = 5x$", "rationale": "This is a slanted line passing through the origin.", "isCorrect": false },
          { "text": "$x + y = 5$", "rationale": "This represents a slanted line with x and y intercepts of 5.", "isCorrect": false }
        ],
        "hint": "Horizontal lines have a constant $y$ value and are written in the form $y = c$."
      },
      {
        "questionNumber": 2,
        "question": "Solve the simultaneous equations: $x + y = 6$ and $x - y = 2$.",
        "answerOptions": [
          { "text": "$x = 2, y = 4$", "rationale": "Checking the second equation: $2 - 4 = -2$, not 2.", "isCorrect": false },
          { "text": "$x = 4, y = 2$", "rationale": "Adding the two equations eliminates $y$: $(x+y) + (x-y) = 6+2 \\Rightarrow 2x = 8 \\Rightarrow x = 4$. Substituting $x=4$ back gives $4 + y = 6 \\Rightarrow y = 2$.", "isCorrect": true },
          { "text": "$x = 5, y = 1$", "rationale": "Checking the second equation: $5 - 1 = 4$, not 2.", "isCorrect": false },
          { "text": "$x = 3, y = 3$", "rationale": "Checking the second equation: $3 - 3 = 0$, not 2.", "isCorrect": false }
        ],
        "hint": "Try the Elimination Method: add the two equations together to cancel out the $y$ variable."
      },
      {
        "questionNumber": 3,
        "question": "Find the gradient and $y$-intercept of the line $2x + 4y = 12$.",
        "answerOptions": [
          { "text": "Gradient = $2$, $y$-intercept = $12$", "rationale": "You must rearrange the equation into the form $y = mx + c$ first.", "isCorrect": false },
          { "text": "Gradient = $-\\frac{1}{2}$, $y$-intercept = $3$", "rationale": "Rearranging gives $4y = -2x + 12$. Dividing by 4 gives $y = -\\frac{1}{2}x + 3$. So, $m = -\\frac{1}{2}$ and $c = 3$.", "isCorrect": true },
          { "text": "Gradient = $-2$, $y$-intercept = $12$", "rationale": "This neglects dividing the whole equation by 4 to isolate $y$.", "isCorrect": false },
          { "text": "Gradient = $\\frac{1}{2}$, $y$-intercept = $-3$", "rationale": "This reverses the signs of the terms during rearrangement.", "isCorrect": false }
        ],
        "hint": "Make $y$ the subject of the formula to get it into the $y = mx + c$ form."
      },
      {
        "questionNumber": 4,
        "question": "A customer bought $2$ cups of coffee and $3$ cups of tea for $3.80$ dollars. Another customer bought $4$ cups of coffee and $5$ cups of tea for $6.90$ dollars. What is the cost of a single cup of tea?",
        "answerOptions": [
          { "text": "$0.70$ dollars", "rationale": "Let $c$ be coffee and $t$ be tea. Eq 1: $2c + 3t = 3.80$. Eq 2: $4c + 5t = 6.90$. Multiplying Eq 1 by 2 gives $4c + 6t = 7.60$. Subtracting Eq 2 from this gives $(4c + 6t) - (4c + 5t) = 7.60 - 6.90 \\Rightarrow t = 0.70$.", "isCorrect": true },
          { "text": "$0.85$ dollars", "rationale": "This is the cost of a cup of coffee, not tea.", "isCorrect": false },
          { "text": "$1.10$ dollars", "rationale": "This is an arithmetic error during the elimination step.", "isCorrect": false },
          { "text": "$1.50$ dollars", "rationale": "This misidentifies the proportional relationship between the variables.", "isCorrect": false }
        ],
        "hint": "Form two simultaneous equations. Try multiplying the first equation by 2 so that the coefficients of the coffee variable match."
      },

      // --- Chapter 2: Linear Inequalities ---
      {
        "questionNumber": 5,
        "question": "Solve the inequality: $-3x < 15$.",
        "answerOptions": [
          { "text": "$x < -5$", "rationale": "You divided by a negative number but forgot to reverse the inequality sign.", "isCorrect": false },
          { "text": "$x > 5$", "rationale": "This is incorrect. You must divide 15 by -3, which is -5.", "isCorrect": false },
          { "text": "$x > -5$", "rationale": "When you divide both sides by $-3$, you must reverse the inequality sign. Thus, $x > -5$.", "isCorrect": true },
          { "text": "$x < 5$", "rationale": "This has both the wrong sign on the number and the wrong inequality direction.", "isCorrect": false }
        ],
        "hint": "Remember the golden rule of inequalities: when you multiply or divide by a negative number, the sign flips!"
      },
      {
        "questionNumber": 6,
